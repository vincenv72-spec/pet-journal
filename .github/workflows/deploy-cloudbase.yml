name: Deploy to Tencent CloudBase (CN)

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

concurrency:
  group: deploy-cloudbase
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to CloudBase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add 404.html for SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: tcb login --apiKeyId "$TENCENTCLOUD_SECRETID" --apiKey "$TENCENTCLOUD_SECRETKEY"

      - name: Deploy static hosting
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: tcb hosting deploy ./dist -e "${{ secrets.TENCENT_ENV_ID }}"

      - name: Summary
        run: |
          echo "### ✅ CloudBase deployed" >> $GITHUB_STEP_SUMMARY
          echo "🌐 https://pet-journal-cn-d2gigyjbz13fa448c-1253801547.tcloudbaseapp.com" >> $GITHUB_STEP_SUMMARY
